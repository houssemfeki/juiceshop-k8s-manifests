apiVersion: apps/v1
kind: Deployment
metadata:
  name: juiceshop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: juiceshop
  template:
    metadata:
      labels:
        app: juiceshop
    spec:
      imagePullSecrets:          
        - name: registry-credentials
      containers:
        - name: juiceshop
          image: registry.local:5443/juiceshop@sha256:dfca71bb7144a1d3da0d2994be034791ca75d16d6dfc747632591c9a97e54431
          ports:
            - containerPort: 3000
