apiVersion: apps/v1
kind: Deployment
metadata:
  name: juiceshop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: juiceshop
  template:
    metadata:
      labels:
        app: juiceshop
    spec:
      imagePullSecrets:          
        - name: registry-credentials
      containers:
        - name: juiceshop
          image: registry.local:5443/juiceshop@sha256:fcade7e80dd543f662550b95f3d0e089331470c091439e6550a3ad6dfb5248c0
          ports:
            - containerPort: 3000
