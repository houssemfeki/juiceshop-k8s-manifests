apiVersion: apps/v1
kind: Deployment
metadata:
  name: juiceshop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: juiceshop
  template:
    metadata:
      labels:
        app: juiceshop
    spec:
      imagePullSecrets:          # ← au même niveau que containers
        - name: registry-credentials
      containers:
        - name: juiceshop
          image: registry.local:5443/juiceshop@sha256:661dfc8bb67af879313065ddc6f6bb26f9441d0d8d30bc8f36da47e685369344
          ports:
            - containerPort: 3000
