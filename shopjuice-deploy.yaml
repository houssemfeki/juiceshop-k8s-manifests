apiVersion: apps/v1
kind: Deployment
metadata:
  name: juiceshop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: juiceshop
  template:
    metadata:
      labels:
        app: juiceshop
    spec:
      imagePullSecrets:          # ← au même niveau que containers
        - name: registry-credentials
      containers:
        - name: juiceshop
          image: registry.local:5443/juiceshop@sha256:a2414d8d8617f1f33aab88cbe41b0015f761cd32e2bfb6451eb64859cdacbb48
          ports:
            - containerPort: 3000
